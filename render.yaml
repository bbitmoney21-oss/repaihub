services:
  - type: web
    name: repaihub
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build && npm run build:server
    startCommand: node dist-server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      # ── Set these in the Render dashboard (Dashboard → Environment) ─────────
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CA_JWT_SECRET
        sync: false
      - key: CA_DEFAULT_PASSWORD
        sync: false
      - key: CA_EMAIL
        value: ca@repaihub.com
      - key: CA_ICAI
        value: "123456"
