[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Only auto-deploy the main branch to production
[build.context.production]
  command = "npm run build"

# dev branch gets a separate preview URL (not the main domain)
[build.context.dev]
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
