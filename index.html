    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is NRO outward remittance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NRO outward remittance is the legal process of transferring money from your NRO (Non-Resident Ordinary) bank account in India to your overseas bank account. REPAIHUB automates the entire process — Form 15CA filing, Form 15CB certification, and FEMA compliance — so you just tap Confirm."
          }
        },
        {
          "@type": "Question",
          "name": "Is REPAIHUB legal and regulated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. REPAIHUB is a FINTRAC-registered Money Services Business (MSB) in Canada and operates in full compliance with FEMA regulations and RBI guidelines for outward remittance."
          }
        },
        {
          "@type": "Question",
          "name": "How long does a transfer take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Standard transfers arrive in your Canadian account within 24–48 hours. Express transfers are completed within 8–12 hours for an additional fee."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to visit a branch in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Never. REPAIHUB is 100% digital. You never need to visit a bank branch in India. Everything is handled from your phone — account verification, compliance forms, and transfer initiation."
          }
        },
        {
          "@type": "Question",
          "name": "What is the annual limit for NRO remittance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Under RBI guidelines, NRIs can remit up to USD 1 million per financial year from their NRO account. REPAIHUB tracks your usage and alerts you as you approach the limit."
          }
        }
      ]
    }
    </script>
